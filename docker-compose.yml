services:
  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - "127.0.0.1:6335:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  app:
    build: .
    ports:
      - "9004:9004"
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      QDRANT_MODE: server
      QDRANT_HOST: qdrant
      QDRANT_PORT: "6333"
      GOOGLE_SERVICE_ACCOUNT_FILE: /run/secrets/google-service-account.json
    depends_on:
      - qdrant
    volumes:
      - app_data:/app/.data
      - ./credentials.json:/run/secrets/google-service-account.json:ro

volumes:
  qdrant_data:
  app_data:
