<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drive Agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .app-shell { display: flex; width: 100%; min-height: 0; }
        .main-panel { display: flex; flex: 1; min-width: 0; flex-direction: column; }
        .sidebar {
            width: 260px; flex: 0 0 260px; padding: 14px 10px;
            background: #111c31; border-right: 1px solid #334155;
            display: flex; flex-direction: column; gap: 12px;
        }
        .new-chat { width: 100%; text-align: left; padding: 10px 12px; }
        .sessions { overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }
        .session-item {
            width: 100%; border: 0; border-radius: 7px; background: transparent;
            color: #cbd5e1; display: flex; align-items: center; gap: 6px; padding: 8px;
            cursor: pointer; text-align: left;
        }
        .session-item:hover, .session-item.active { background: #334155; color: #f8fafc; }
        .session-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; font-size: 13px; }
        .delete-session { border: 0; background: transparent; color: #94a3b8; cursor: pointer; padding: 2px 5px; }
        .delete-session:hover { color: #fca5a5; }

        /* Header */
        .header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9;
        }
        .header .subtitle {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 2px;
        }
        .header-actions {
            display: flex;
            gap: 8px;
        }
        .btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #334155;
            color: #cbd5e1;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn:hover { background: #475569; color: #f1f5f9; }
        .btn-danger { border-color: #ef4444; color: #fca5a5; }
        .btn-danger:hover { background: #dc2626; color: #fff; }
        .actor { align-self: center; color: #94a3b8; font-size: 12px; }
        .login-panel {
            position: fixed; inset: 0; z-index: 200;
            display: flex; align-items: center; justify-content: center;
            background: rgba(15, 23, 42, 0.92);
        }
        .login-card {
            width: min(360px, calc(100vw - 32px)); padding: 24px;
            border: 1px solid #334155; border-radius: 12px; background: #1e293b;
        }
        .login-card h2 { margin-bottom: 16px; font-size: 18px; }
        .login-card input {
            width: 100%; margin: 6px 0 12px; padding: 10px; border-radius: 7px;
            border: 1px solid #475569; background: #0f172a; color: #e2e8f0;
        }
        .login-error { min-height: 18px; color: #fca5a5; font-size: 12px; }

        /* Chat area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #3b82f6;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: #1e293b;
            border: 1px solid #334155;
            border-bottom-left-radius: 4px;
        }

        .message .tools-badge {
            display: inline-flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .tool-tag {
            font-size: 11px;
            padding: 2px 8px;
            background: #065f46;
            color: #6ee7b7;
            border-radius: 10px;
            font-family: monospace;
        }

        /* Typing indicator */
        .typing {
            align-self: flex-start;
            padding: 12px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            display: none;
        }
        .typing.active { display: flex; gap: 4px; align-items: center; }
        .typing-text { color: #94a3b8; font-size: 13px; margin-right: 6px; }
        .typing-dots { display: flex; gap: 4px; }
        .typing-dots span {
            width: 8px; height: 8px;
            background: #64748b;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Input area */
        .input-area {
            background: #1e293b;
            border-top: 1px solid #334155;
            padding: 16px 24px;
            display: flex;
            gap: 12px;
        }
        .input-area textarea {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 120px;
        }
        .input-area textarea:focus { border-color: #3b82f6; }
        .input-area textarea::placeholder { color: #64748b; }

        .send-btn {
            padding: 10px 20px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            align-self: flex-end;
        }
        .send-btn:hover { background: #2563eb; }
        .send-btn:disabled { background: #475569; cursor: not-allowed; }

        /* Audit panel */
        .audit-panel {
            display: none;
            position: fixed;
            right: 0; top: 0; bottom: 0;
            width: 420px;
            background: #1e293b;
            border-left: 1px solid #334155;
            z-index: 100;
            flex-direction: column;
        }
        .audit-panel.open { display: flex; }
        .audit-panel .panel-header {
            padding: 16px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .audit-panel .panel-header h2 { font-size: 16px; }
        .audit-panel .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            color: #94a3b8;
        }
        .audit-entry {
            padding: 8px;
            border-bottom: 1px solid #334155;
            margin-bottom: 4px;
        }
        .audit-entry .status-ok { color: #4ade80; }
        .audit-entry .status-fail { color: #f87171; }

        .source-list { margin-top: 10px; display: grid; gap: 6px; white-space: normal; }
        .source-card {
            display: block; padding: 8px 10px; border: 1px solid #334155;
            border-radius: 8px; background: #0f172a; color: #cbd5e1;
            text-decoration: none; font-size: 12px;
        }
        .source-card:hover { border-color: #3b82f6; }
        .source-card .source-title { color: #93c5fd; font-weight: 600; }
        .source-card .source-snippet { color: #94a3b8; margin-top: 3px; }

        .documents-panel {
            display: none; position: fixed; right: 0; top: 0; bottom: 0;
            width: min(560px, 100vw); background: #1e293b;
            border-left: 1px solid #334155; z-index: 110; flex-direction: column;
        }
        .documents-panel.open { display: flex; }
        .documents-panel .panel-header {
            padding: 16px; border-bottom: 1px solid #334155;
            display: flex; justify-content: space-between; align-items: center;
        }
        .documents-panel .panel-controls {
            padding: 12px; display: flex; gap: 8px; flex-wrap: wrap;
            border-bottom: 1px solid #334155;
        }
        .documents-summary { color: #94a3b8; font-size: 12px; padding: 0 12px 12px; }
        .documents-body { flex: 1; overflow-y: auto; padding: 12px; }
        .document-row {
            border: 1px solid #334155; border-radius: 8px; padding: 10px;
            margin-bottom: 8px; background: #0f172a;
        }
        .document-row a { color: #93c5fd; text-decoration: none; font-weight: 600; }
        .document-meta { color: #94a3b8; font-size: 11px; margin-top: 5px; }
        .document-error { color: #fca5a5; font-size: 11px; margin-top: 5px; }
        .status-badge { font-size: 10px; padding: 2px 7px; border-radius: 9px; margin-left: 6px; }
        .status-indexed { background: #065f46; color: #6ee7b7; }
        .status-stale, .status-unsupported { background: #78350f; color: #fcd34d; }
        .status-failed, .status-removed { background: #7f1d1d; color: #fca5a5; }

        /* Welcome */
        .welcome {
            text-align: center;
            color: #64748b;
            margin: auto;
            padding: 40px;
        }
        .welcome h2 { color: #94a3b8; margin-bottom: 12px; font-size: 20px; }
        .welcome p { font-size: 14px; line-height: 1.8; }
        .welcome .caps { display: flex; gap: 12px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .welcome .cap {
            padding: 8px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            font-size: 13px;
        }
        @media (max-width: 700px) {
            .sidebar { width: 205px; flex-basis: 205px; }
            .header { padding: 12px; }
            .header .subtitle { display: none; }
            .header-actions { gap: 4px; }
            .header-actions .btn { padding: 6px 8px; }
            .chat-container, .input-area { padding-left: 12px; padding-right: 12px; }
        }
    </style>
</head>
<body>

<div class="app-shell">
<aside class="sidebar">
    <button class="btn new-chat" onclick="createNewChat()">+ New chat</button>
    <div class="sessions" id="sessionsList"></div>
</aside>
<main class="main-panel">
<!-- Header -->
<div class="header">
    <div>
        <h1>Drive Agent</h1>
        <div class="subtitle">Google Drive | RAG Memory | Tool Registry 6-step</div>
    </div>
    <div class="header-actions">
        <span class="actor" id="actorLabel">Not signed in</span>
        <button class="btn" onclick="toggleDocuments()">Documents</button>
        <button class="btn" onclick="toggleAudit()">Audit Log</button>
        <button class="btn btn-danger" onclick="clearChat()">Clear</button>
        <button class="btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="login-panel" id="loginPanel">
    <form class="login-card" id="loginForm">
        <h2>Sign in to Drive Agent</h2>
        <label>Username</label>
        <input id="username" autocomplete="username" required>
        <label>Password</label>
        <input id="password" type="password" autocomplete="current-password" required>
        <div class="login-error" id="loginError"></div>
        <button class="send-btn" type="submit">Sign in</button>
    </form>
</div>

<!-- Chat -->
<div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
        <h2>AI Agent</h2>
        <p>Agent with 6-step Tool Registry pipeline</p>
        <div class="caps">
            <div class="cap">Google Drive</div>
            <div class="cap">JWT Auth</div>
            <div class="cap">RAG Memory</div>
        </div>
    </div>
</div>

<!-- Typing indicator -->
<div class="typing" id="typing">
    <span class="typing-text" id="typingText">Agent is working...</span>
    <div class="typing-dots"><span></span><span></span><span></span></div>
</div>

<!-- Input -->
<div class="input-area">
    <textarea id="input" placeholder="Type a message..." rows="1"
        onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage()}"
        oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
</div>
</main>
</div>

<!-- Documents Panel -->
<div class="documents-panel" id="documentsPanel">
    <div class="panel-header">
        <h2>Drive Documents</h2>
        <button class="btn" onclick="toggleDocuments()">Close</button>
    </div>
    <div class="panel-controls">
        <button class="btn" id="syncDriveBtn" onclick="syncDrive('incremental')">Sync now</button>
        <button class="btn" id="fullSyncDriveBtn" onclick="syncDrive('full')">Full re-index</button>
        <button class="btn" onclick="loadDocuments()">Refresh</button>
    </div>
    <div class="documents-summary" id="documentsSummary">Loading...</div>
    <div class="documents-body" id="documentsBody"></div>
</div>

<!-- Audit Panel -->
<div class="audit-panel" id="auditPanel">
    <div class="panel-header">
        <h2>Audit Log</h2>
        <button class="btn" onclick="toggleAudit()">Close</button>
    </div>
    <div class="panel-body" id="auditBody">Loading...</div>
</div>

<script>
const SESSION_STORAGE_KEY = 'drive-agent-access-token';
const ACTOR_STORAGE_KEY = 'drive-agent-actor';
const SESSION_ID_KEY = 'drive-agent-session-id';
let sessionId = sessionStorage.getItem(SESSION_ID_KEY) || '';
let activeChatRequest = null;
let sessionNavigationVersion = 0;
let sessionNavigationInFlight = false;
let currentActor = null;
let documentsPollTimer = null;
const API = '';

function getToken() {
    return sessionStorage.getItem(SESSION_STORAGE_KEY);
}

function authHeaders() {
    const token = getToken();
    return token ? { 'Authorization': 'Bearer ' + token } : {};
}

function showLogin(message = '') {
    document.getElementById('loginPanel').style.display = 'flex';
    document.getElementById('loginError').textContent = message;
}

function setActor(user) {
    currentActor = user;
    sessionStorage.setItem(ACTOR_STORAGE_KEY, JSON.stringify(user));
    document.getElementById('actorLabel').textContent = user.username + ' (' + user.role + ')';
    document.getElementById('loginPanel').style.display = 'none';
}

async function authenticatedFetch(path, options = {}) {
    const headers = { ...authHeaders(), ...(options.headers || {}) };
    const response = await fetch(API + path, { ...options, headers });
    if (response.status === 401) {
        logout('Your session has expired. Please sign in again.');
        throw new Error('Authentication required');
    }
    return response;
}

async function restoreSession() {
    const token = getToken();
    if (!token) return showLogin();
    try {
        const response = await authenticatedFetch('/api/auth/me');
        if (!response.ok) throw new Error('Could not restore session');
        setActor(await response.json());
        await initializeChats();
    } catch (_) {
        showLogin('Please sign in.');
    }
}

document.getElementById('loginForm').addEventListener('submit', async (event) => {
    event.preventDefault();
    const error = document.getElementById('loginError');
    error.textContent = '';
    try {
        const response = await fetch(API + '/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value,
            }),
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.detail || 'Login failed');
        sessionStorage.setItem(SESSION_STORAGE_KEY, data.access_token);
        setActor(data.user);
        await initializeChats();
        document.getElementById('password').value = '';
    } catch (err) {
        error.textContent = err.message;
    }
});

function logout(message = '') {
    cancelActiveChatRequest();
    stopDocumentsPolling();
    currentActor = null;
    sessionStorage.removeItem(SESSION_STORAGE_KEY);
    sessionStorage.removeItem(ACTOR_STORAGE_KEY);
    document.getElementById('actorLabel').textContent = 'Not signed in';
    showLogin(message);
}

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function safeDriveLink(value) {
    try {
        const url = new URL(value);
        if (url.protocol !== 'https:') return '';
        if (!['drive.google.com', 'docs.google.com'].includes(url.hostname)) return '';
        return url.href;
    } catch (_) {
        return '';
    }
}

function addMessage(text, role, toolsUsed = [], citations = []) {
    document.getElementById('welcome')?.remove();

    const container = document.getElementById('chatContainer');
    const div = document.createElement('div');
    div.className = 'message ' + role;
    div.textContent = text;

    if (toolsUsed.length > 0) {
        const badge = document.createElement('div');
        badge.className = 'tools-badge';
        toolsUsed.forEach(t => {
            const tag = document.createElement('span');
            tag.className = 'tool-tag';
            tag.textContent = t;
            badge.appendChild(tag);
        });
        div.appendChild(badge);
    }

    if (citations.length > 0) {
        const list = document.createElement('div');
        list.className = 'source-list';
        citations.forEach(citation => {
            const link = document.createElement('a');
            link.className = 'source-card';
            const safeLink = safeDriveLink(citation.web_view_link || '');
            if (safeLink) {
                link.href = safeLink;
                link.target = '_blank';
                link.rel = 'noopener noreferrer';
            }
            const title = document.createElement('div');
            title.className = 'source-title';
            const locator = citation.page_number
                ? 'page ' + citation.page_number
                : (citation.section || 'document');
            title.textContent = '[' + citation.id + '] ' + citation.source_name + ' · ' + locator;
            const snippet = document.createElement('div');
            snippet.className = 'source-snippet';
            snippet.textContent = citation.snippet || '';
            link.append(title, snippet);
            list.appendChild(link);
        });
        div.appendChild(list);
    }

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function setTyping(active) {
    const message = arguments.length > 1 ? arguments[1] : 'Agent is working...';
    const el = document.getElementById('typing');
    const text = document.getElementById('typingText');
    const container = document.getElementById('chatContainer');
    if (!el || !text) return;
    text.textContent = message;
    if (active) {
        el.classList.add('active');
        container.appendChild(el);
        container.scrollTop = container.scrollHeight;
    } else {
        el.classList.remove('active');
    }
}

function cancelActiveChatRequest() {
    const request = activeChatRequest;
    activeChatRequest = null;
    if (request) request.controller.abort();
    setTyping(false);
    document.getElementById('sendBtn').disabled = false;
}

function beginSessionNavigation() {
    cancelActiveChatRequest();
    sessionNavigationInFlight = true;
    document.getElementById('sendBtn').disabled = true;
    return ++sessionNavigationVersion;
}

function finishSessionNavigation(version) {
    if (version !== sessionNavigationVersion) return;
    sessionNavigationInFlight = false;
    if (!activeChatRequest) document.getElementById('sendBtn').disabled = false;
    document.getElementById('input').focus();
}

function statusMessage(status) {
    const toolMessages = {
        list_drive_files: 'Searching Google Drive files...',
        get_drive_file: 'Downloading file from Google Drive...',
        read_file_tool: 'Reading file content...',
        save_memory: 'Saving to memory...',
        search_memory: 'Searching memory...',
        search_drive_knowledge: 'Searching indexed Drive documents...',
    };
    if (status.stage === 'thinking') return 'Analyzing your request...';
    if (status.stage === 'tool_started') return toolMessages[status.tool] || `Running ${status.tool}...`;
    if (status.stage === 'tool_finished') return `Finished ${status.tool}.`;
    if (status.stage === 'tool_failed') return `${status.tool} could not be completed.`;
    return 'Agent is working...';
}

async function streamChat(payload, onEvent, signal) {
    const res = await authenticatedFetch('/api/chat/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'text/event-stream' },
        body: JSON.stringify(payload),
        signal,
    });
    if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.detail || data.response || 'Chat request failed');
    }
    if (!res.body) throw new Error('Streaming response is unavailable');

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
        const { value, done } = await reader.read();
        buffer += decoder.decode(value || new Uint8Array(), { stream: !done });
        const events = buffer.split(/\r?\n\r?\n/);
        buffer = events.pop();
        for (const rawEvent of events) {
            let event = 'message';
            const data = [];
            rawEvent.split(/\r?\n/).forEach(line => {
                if (line.startsWith('event:')) event = line.slice(6).trim();
                if (line.startsWith('data:')) data.push(line.slice(5).trim());
            });
            if (data.length) onEvent(event, JSON.parse(data.join('\n')));
        }
        if (done) break;
    }
}

async function loadHistory(targetSessionId = sessionId) {
    if (!getToken()) return;
    const res = await authenticatedFetch(
        '/api/chat/history?session_id=' + encodeURIComponent(targetSessionId)
    );
    if (!res.ok) throw new Error('Could not load chat history');
    const data = await res.json();
    if (targetSessionId !== sessionId) return;
    showWelcome();
    data.messages.forEach(message => addMessage(
        message.content,
        message.role,
        [],
        message.citations || []
    ));
}

function showWelcome() {
    const container = document.getElementById('chatContainer');
    const typing = document.getElementById('typing');
    container.replaceChildren();
    const welcome = document.createElement('div');
    welcome.className = 'welcome';
    welcome.id = 'welcome';
    const title = document.createElement('h2');
    title.textContent = 'AI Agent';
    const description = document.createElement('p');
    description.textContent = 'Agent with 6-step Tool Registry pipeline';
    const caps = document.createElement('div');
    caps.className = 'caps';
    ['Google Drive', 'JWT Auth', 'RAG Memory'].forEach(name => {
        const cap = document.createElement('div');
        cap.className = 'cap';
        cap.textContent = name;
        caps.appendChild(cap);
    });
    welcome.append(title, description, caps);
    container.appendChild(welcome);
    if (typing) container.appendChild(typing);
}

async function initializeChats() {
    const sessions = await getSessions();
    if (!sessions.some(item => item.session_id === sessionId)) {
        const created = await createNewChat(false);
        sessionId = created.session_id;
        sessionStorage.setItem(SESSION_ID_KEY, sessionId);
    }
    await loadSessions();
    await loadHistory(sessionId);
}

async function getSessions() {
    const res = await authenticatedFetch('/api/chat/sessions');
    if (!res.ok) throw new Error('Could not load chat sessions');
    return (await res.json()).sessions;
}

async function loadSessions() {
    const sessions = await getSessions();
    const list = document.getElementById('sessionsList');
    list.replaceChildren();
    sessions.forEach(session => {
        const item = document.createElement('div');
        item.className = 'session-item' + (session.session_id === sessionId ? ' active' : '');
        item.tabIndex = 0;
        item.setAttribute('role', 'button');
        item.onclick = () => selectSession(session.session_id);
        item.onkeydown = event => {
            if (event.key === 'Enter' || event.key === ' ') selectSession(session.session_id);
        };
        const title = document.createElement('span');
        title.className = 'session-title';
        title.textContent = session.title;
        const remove = document.createElement('button');
        remove.className = 'delete-session';
        remove.type = 'button';
        remove.title = 'Delete chat';
        remove.textContent = '×';
        remove.onclick = event => deleteSession(session.session_id, event);
        item.append(title, remove);
        list.appendChild(item);
    });
    return sessions;
}

async function createNewChat(select = true) {
    const navigationVersion = select ? beginSessionNavigation() : null;
    try {
        const res = await authenticatedFetch('/api/chat/sessions', { method: 'POST' });
        if (!res.ok) throw new Error('Could not create a chat');
        const created = await res.json();
        if (select && navigationVersion === sessionNavigationVersion) {
            sessionId = created.session_id;
            sessionStorage.setItem(SESSION_ID_KEY, sessionId);
            showWelcome();
            await loadSessions();
        }
        return created;
    } finally {
        if (select) finishSessionNavigation(navigationVersion);
    }
}

async function selectSession(nextSessionId) {
    if (nextSessionId === sessionId) return;
    const navigationVersion = beginSessionNavigation();
    try {
        sessionId = nextSessionId;
        sessionStorage.setItem(SESSION_ID_KEY, sessionId);
        await loadSessions();
        await loadHistory(nextSessionId);
    } finally {
        finishSessionNavigation(navigationVersion);
    }
}

async function deleteSession(targetSessionId, event) {
    event.stopPropagation();
    if (!confirm('Delete this chat and its saved history?')) return;
    const res = await authenticatedFetch('/api/chat/sessions/' + encodeURIComponent(targetSessionId), {
        method: 'DELETE',
    });
    if (!res.ok) throw new Error('Could not delete the chat');
    if (targetSessionId === sessionId) {
        await createNewChat(true);
    } else {
        await loadSessions();
    }
}

async function sendMessage() {
    const input = document.getElementById('input');
    const btn = document.getElementById('sendBtn');
    const message = input.value.trim();
    if (!message || !getToken() || activeChatRequest || sessionNavigationInFlight) return;

    const requestSessionId = sessionId;
    const request = {
        sessionId: requestSessionId,
        controller: new AbortController(),
    };
    activeChatRequest = request;

    addMessage(message, 'user');
    input.value = '';
    input.style.height = 'auto';
    btn.disabled = true;
    setTyping(true, 'Analyzing your request...');

    try {
        let completed = false;
        await streamChat({ session_id: requestSessionId, message }, (event, data) => {
            if (activeChatRequest !== request || sessionId !== requestSessionId) return;
            if (event === 'status') setTyping(true, statusMessage(data));
            if (event === 'final') {
                addMessage(
                    data.response,
                    'assistant',
                    data.tools_used || [],
                    data.citations || []
                );
                completed = true;
            }
            if (event === 'error') throw new Error(data.message || 'Chat request failed');
        }, request.controller.signal);
        if (activeChatRequest !== request || sessionId !== requestSessionId) return;
        if (!completed) throw new Error('Chat stream ended without a response');
        await loadSessions();
    } catch (err) {
        if (err.name !== 'AbortError' && activeChatRequest === request) {
            addMessage('Error: ' + err.message, 'assistant');
        }
    } finally {
        if (activeChatRequest === request) {
            activeChatRequest = null;
            setTyping(false);
            btn.disabled = false;
            input.focus();
        }
    }
}

async function clearChat() {
    showWelcome();
}

function stopDocumentsPolling() {
    if (documentsPollTimer) clearTimeout(documentsPollTimer);
    documentsPollTimer = null;
}

async function toggleDocuments() {
    const panel = document.getElementById('documentsPanel');
    panel.classList.toggle('open');
    if (!panel.classList.contains('open')) {
        stopDocumentsPolling();
        return;
    }
    document.getElementById('auditPanel').classList.remove('open');
    const canSync = (currentActor?.scopes || []).includes('drive:sync');
    document.getElementById('syncDriveBtn').style.display = canSync ? '' : 'none';
    document.getElementById('fullSyncDriveBtn').style.display = canSync ? '' : 'none';
    await loadDocuments();
}

async function loadDocuments() {
    if (!getToken()) return;
    stopDocumentsPolling();
    const summary = document.getElementById('documentsSummary');
    const body = document.getElementById('documentsBody');
    try {
        const [statusResponse, documentsResponse] = await Promise.all([
            authenticatedFetch('/api/drive/sync/status'),
            authenticatedFetch('/api/drive/documents?limit=200'),
        ]);
        if (!statusResponse.ok || !documentsResponse.ok) throw new Error('Could not load documents');
        const syncStatus = await statusResponse.json();
        const documents = await documentsResponse.json();
        const counts = syncStatus.documents || {};
        const job = syncStatus.active_job;
        summary.textContent = job
            ? 'Sync ' + job.status + ' · ' + documents.total + ' files'
            : 'Indexed ' + (counts.indexed || 0) + ' · stale ' + (counts.stale || 0)
                + ' · failed ' + (counts.failed || 0) + ' · unsupported '
                + (counts.unsupported || 0);
        body.replaceChildren();
        documents.documents.forEach(documentItem => {
            const row = document.createElement('div');
            row.className = 'document-row';
            const safeLink = safeDriveLink(documentItem.web_view_link || '');
            const title = safeLink ? document.createElement('a') : document.createElement('span');
            if (safeLink) {
                title.href = safeLink;
                title.target = '_blank';
                title.rel = 'noopener noreferrer';
            }
            title.textContent = documentItem.source_name;
            const badge = document.createElement('span');
            badge.className = 'status-badge status-' + documentItem.status;
            badge.textContent = documentItem.status;
            const meta = document.createElement('div');
            meta.className = 'document-meta';
            meta.textContent = (documentItem.page_count || 0) + ' pages · '
                + (documentItem.chunk_count || 0) + ' chunks · '
                + (documentItem.drive_path || 'Drive root');
            row.append(title, badge, meta);
            if (documentItem.error) {
                const error = document.createElement('div');
                error.className = 'document-error';
                error.textContent = documentItem.error;
                row.appendChild(error);
            }
            body.appendChild(row);
        });
        if (!documents.documents.length) body.textContent = 'No indexed documents yet.';
        if (job && document.getElementById('documentsPanel').classList.contains('open')) {
            documentsPollTimer = setTimeout(loadDocuments, 2000);
        }
    } catch (error) {
        summary.textContent = error.message;
        body.replaceChildren();
    }
}

async function syncDrive(mode) {
    const summary = document.getElementById('documentsSummary');
    try {
        const response = await authenticatedFetch('/api/drive/sync', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mode }),
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
            throw new Error(data.detail?.code || data.detail || 'Could not start sync');
        }
        await loadDocuments();
    } catch (error) {
        summary.textContent = error.message;
    }
}

async function toggleAudit() {
    const panel = document.getElementById('auditPanel');
    panel.classList.toggle('open');
    if (panel.classList.contains('open')) {
        document.getElementById('documentsPanel').classList.remove('open');
        stopDocumentsPolling();
        if (!getToken()) return showLogin();
        try {
            const res = await authenticatedFetch('/audit?session_id=' + encodeURIComponent(sessionId));
            const data = await res.json();
            const body = document.getElementById('auditBody');

            if (data.audit_log.length === 0) {
                body.textContent = 'No audit logs yet.';
                return;
            }
            body.textContent = JSON.stringify(data.audit_log, null, 2);
        } catch(e) {
            document.getElementById('auditBody').textContent = 'Error loading audit log.';
        }
    }
}

restoreSession();
