<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent - Assignment 1</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 600;
            color: #f1f5f9;
        }
        .header .subtitle {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 2px;
        }
        .header-actions {
            display: flex;
            gap: 8px;
        }
        .btn {
            padding: 6px 14px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #334155;
            color: #cbd5e1;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .btn:hover { background: #475569; color: #f1f5f9; }
        .btn-danger { border-color: #ef4444; color: #fca5a5; }
        .btn-danger:hover { background: #dc2626; color: #fff; }

        /* Chat area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #3b82f6;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: #1e293b;
            border: 1px solid #334155;
            border-bottom-left-radius: 4px;
        }

        .message .tools-badge {
            display: inline-flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .tool-tag {
            font-size: 11px;
            padding: 2px 8px;
            background: #065f46;
            color: #6ee7b7;
            border-radius: 10px;
            font-family: monospace;
        }

        /* Typing indicator */
        .typing {
            align-self: flex-start;
            padding: 12px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            border-bottom-left-radius: 4px;
            display: none;
        }
        .typing.active { display: flex; gap: 4px; align-items: center; }
        .typing span {
            width: 8px; height: 8px;
            background: #64748b;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
            40% { transform: scale(1); opacity: 1; }
        }

        /* Input area */
        .input-area {
            background: #1e293b;
            border-top: 1px solid #334155;
            padding: 16px 24px;
            display: flex;
            gap: 12px;
        }
        .input-area textarea {
            flex: 1;
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid #475569;
            background: #0f172a;
            color: #e2e8f0;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 44px;
            max-height: 120px;
        }
        .input-area textarea:focus { border-color: #3b82f6; }
        .input-area textarea::placeholder { color: #64748b; }

        .send-btn {
            padding: 10px 20px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
            align-self: flex-end;
        }
        .send-btn:hover { background: #2563eb; }
        .send-btn:disabled { background: #475569; cursor: not-allowed; }

        /* Audit panel */
        .audit-panel {
            display: none;
            position: fixed;
            right: 0; top: 0; bottom: 0;
            width: 420px;
            background: #1e293b;
            border-left: 1px solid #334155;
            z-index: 100;
            flex-direction: column;
        }
        .audit-panel.open { display: flex; }
        .audit-panel .panel-header {
            padding: 16px;
            border-bottom: 1px solid #334155;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .audit-panel .panel-header h2 { font-size: 16px; }
        .audit-panel .panel-body {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            color: #94a3b8;
        }
        .audit-entry {
            padding: 8px;
            border-bottom: 1px solid #334155;
            margin-bottom: 4px;
        }
        .audit-entry .status-ok { color: #4ade80; }
        .audit-entry .status-fail { color: #f87171; }

        /* Welcome */
        .welcome {
            text-align: center;
            color: #64748b;
            margin: auto;
            padding: 40px;
        }
        .welcome h2 { color: #94a3b8; margin-bottom: 12px; font-size: 20px; }
        .welcome p { font-size: 14px; line-height: 1.8; }
        .welcome .caps { display: flex; gap: 12px; justify-content: center; margin-top: 20px; flex-wrap: wrap; }
        .welcome .cap {
            padding: 8px 16px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            font-size: 13px;
        }
    </style>
</head>
<body>

<!-- Header -->
<div class="header">
    <div>
        <h1>AI Agent - Assignment 1</h1>
        <div class="subtitle">Google Drive | Code Sandbox | RAG Memory | Tool Registry 6-step</div>
    </div>
    <div class="header-actions">
        <button class="btn" onclick="toggleAudit()">Audit Log</button>
        <button class="btn btn-danger" onclick="clearChat()">Clear</button>
    </div>
</div>

<!-- Chat -->
<div class="chat-container" id="chatContainer">
    <div class="welcome" id="welcome">
        <h2>AI Agent</h2>
        <p>Agent with 6-step Tool Registry pipeline</p>
        <div class="caps">
            <div class="cap">Google Drive</div>
            <div class="cap">Code Sandbox</div>
            <div class="cap">RAG Memory</div>
        </div>
    </div>
</div>

<!-- Typing indicator -->
<div class="typing" id="typing">
    <span></span><span></span><span></span>
</div>

<!-- Input -->
<div class="input-area">
    <textarea id="input" placeholder="Type a message..." rows="1"
        onkeydown="if(event.key==='Enter' && !event.shiftKey){event.preventDefault();sendMessage()}"
        oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
</div>

<!-- Audit Panel -->
<div class="audit-panel" id="auditPanel">
    <div class="panel-header">
        <h2>Audit Log</h2>
        <button class="btn" onclick="toggleAudit()">Close</button>
    </div>
    <div class="panel-body" id="auditBody">Loading...</div>
</div>

<script>
const SESSION_ID = 'session-' + Date.now();
const API = '';

function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function addMessage(text, role, toolsUsed = []) {
    document.getElementById('welcome')?.remove();

    const container = document.getElementById('chatContainer');
    const div = document.createElement('div');
    div.className = 'message ' + role;
    div.textContent = text;

    if (toolsUsed.length > 0) {
        const badge = document.createElement('div');
        badge.className = 'tools-badge';
        toolsUsed.forEach(t => {
            const tag = document.createElement('span');
            tag.className = 'tool-tag';
            tag.textContent = t;
            badge.appendChild(tag);
        });
        div.appendChild(badge);
    }

    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

function setTyping(active) {
    const el = document.getElementById('typing');
    const container = document.getElementById('chatContainer');
    if (active) {
        el.classList.add('active');
        container.appendChild(el);
        container.scrollTop = container.scrollHeight;
    } else {
        el.classList.remove('active');
    }
}

async function sendMessage() {
    const input = document.getElementById('input');
    const btn = document.getElementById('sendBtn');
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, 'user');
    input.value = '';
    input.style.height = 'auto';
    btn.disabled = true;
    setTyping(true);

    try {
        const res = await fetch(API + '/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: SESSION_ID, message })
        });
        const data = await res.json();
        addMessage(data.response, 'assistant', data.tools_used);
    } catch (err) {
        addMessage('Error: ' + err.message, 'assistant');
    } finally {
        setTyping(false);
        btn.disabled = false;
        input.focus();
    }
}

async function clearChat() {
    try {
        await fetch(API + '/api/clear', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ session_id: SESSION_ID })
        });
    } catch(e) {}

    const container = document.getElementById('chatContainer');
    container.innerHTML = `
        <div class="welcome" id="welcome">
            <h2>AI Agent</h2>
            <p>Agent with 6-step Tool Registry pipeline</p>
            <div class="caps">
                <div class="cap">Google Drive</div>
                <div class="cap">Code Sandbox</div>
                <div class="cap">RAG Memory</div>
            </div>
        </div>`;
}

async function toggleAudit() {
    const panel = document.getElementById('auditPanel');
    panel.classList.toggle('open');

    if (panel.classList.contains('open')) {
        try {
            const res = await fetch(API + '/api/audit?session_id=' + SESSION_ID);
            const data = await res.json();
            const body = document.getElementById('auditBody');

            if (data.audit_log.length === 0) {
                body.textContent = 'No audit logs yet.';
                return;
            }

            body.innerHTML = data.audit_log.map(entry => `
                <div class="audit-entry">
                    <div><strong>${entry.tool}</strong>
                        <span class="${entry.status === 'success' ? 'status-ok' : 'status-fail'}">
                            [${entry.status}]
                        </span>
                    </div>
                    <div>User: ${entry.user_id} (${entry.role}) | ${entry.timestamp.split('T')[1]?.split('.')[0] || ''}</div>
                    <div>Args: ${JSON.stringify(entry.arguments).substring(0, 100)}</div>
                </div>
            `).join('');
        } catch(e) {
            document.getElementById('auditBody').textContent = 'Error loading audit log.';
        }
    }
}
</script>
</body>
</html>
